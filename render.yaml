services:
  - type: web
    name: rundown-dashboard
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: WEATHER_API_KEY
        sync: false
      - key: LLM_BASE_URL
        sync: false
      - key: LLM_API_KEY
        sync: false
      - key: LLM_MODEL
        value: gemini-2.5-flash
      - key: LLM_FALLBACK_MODEL
        value: gemini/gemini-2.5-flash-lite
